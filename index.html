<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Мир ✨</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- ЗАГРУЗКА -->
    <div id="loadingScreen" class="d-flex flex-column justify-content-center align-items-center vh-100">
        <div class="spinner-border text-primary mb-3" style="width:3rem;height:3rem"></div>
        <p class="text-muted">Загружаем...</p>
    </div>

    <!-- ВХОД -->
    <div id="loginScreen" class="d-flex flex-column justify-content-center align-items-center vh-100 d-none">
        <i class="bi bi-compass" style="font-size:5rem;color:var(--bs-primary)"></i>
        <h1 class="mt-3 fw-bold">Мой Мир</h1>
        <p class="text-muted mb-4">Путешествия, рестораны, фильмы — всё в одном</p>
        <button id="loginBtn" class="btn btn-primary btn-lg px-5 shadow-sm"><i class="bi bi-google me-2"></i>Войти</button>
    </div>

    <!-- ПРИЛОЖЕНИЕ -->
    <div id="appScreen" class="d-none">
        
        <!-- Навигация -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow-sm">
            <div class="container">
                <span class="navbar-brand fw-bold"><i class="bi bi-compass me-2"></i>Мой Мир</span>
                <div class="d-flex align-items-center gap-2">
                    <span class="text-white-50 small d-none d-md-inline" id="userName"></span>
                    <button class="btn btn-outline-light btn-sm position-relative" data-bs-toggle="modal" data-bs-target="#friendsModal">
                        <i class="bi bi-people-fill me-1"></i>Друзья
                        <span id="friendsBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none" style="font-size:0.6rem">0</span>
                    </button>
                    <button id="logoutBtn" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right"></i></button>
                </div>
            </div>
        </nav>

        <!-- Меню разделов -->
        <div class="bg-white border-bottom shadow-sm">
            <div class="container">
                <ul class="nav nav-pills py-2 flex-nowrap overflow-auto" id="sectionMenu">
                    <li class="nav-item"><button class="nav-link active" data-section="travel"><i class="bi bi-airplane me-1"></i>Путешествия</button></li>
                    <li class="nav-item"><button class="nav-link" data-section="food"><i class="bi bi-cup-hot me-1"></i>Рестораны</button></li>
                    <li class="nav-item"><button class="nav-link disabled" data-section="movies"><i class="bi bi-film me-1"></i>Кино</button></li>
                    <li class="nav-item"><button class="nav-link disabled" data-section="dreams"><i class="bi bi-star me-1"></i>Мечты</button></li>
                </ul>
            </div>
        </div>

        <!-- Контейнер разделов -->
        <div id="sectionContainer" class="container py-3">
            <!-- Заполняется динамически -->
        </div>
    </div>

    <!-- МОДАЛКИ -->
    <div class="modal fade" id="friendsModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-light"><h5 class="modal-title"><i class="bi bi-people-fill me-2"></i>Друзья</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <div class="alert alert-light border small mb-3"><div class="d-flex justify-content-between align-items-center"><span><strong>Мой ID:</strong> <code id="myUserId" class="user-select-all">...</code></span><button class="btn btn-sm btn-outline-secondary" id="copyIdBtn"><i class="bi bi-clipboard"></i></button></div></div>
                    <label class="form-label fw-medium">Добавить друга по ID</label>
                    <div class="input-group mb-3"><input type="text" class="form-control" id="friendIdInput" placeholder="Вставьте ID"><button class="btn btn-success" id="addFriendBtn"><i class="bi bi-send me-1"></i>Отправить</button></div>
                    <div id="requestStatus" class="small mb-3"></div>
                    <h6 class="text-muted mb-2">📨 Входящие <span id="incomingBadge" class="badge bg-danger d-none">0</span></h6>
                    <div id="incomingRequests"><p class="text-muted small text-center py-2">Нет заявок</p></div>
                    <hr>
                    <h6 class="text-muted mb-2">📤 Отправленные</h6>
                    <div id="outgoingRequests"><p class="text-muted small text-center py-2">Нет заявок</p></div>
                    <hr>
                    <h6 class="text-muted mb-2">❤️ Друзья</h6>
                    <div id="friendsList"><p class="text-muted small text-center py-2">Пока нет</p></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="photoModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered"><div class="modal-content bg-dark border-0"><div class="modal-header border-0"><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div><div class="modal-body text-center"><img id="modalMainPhoto" src="" class="rounded mb-3 shadow"><div id="modalThumbnails" class="d-flex justify-content-center gap-2 flex-wrap"></div></div></div></div>
    </div>

    <div class="modal fade" id="placeDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable"><div class="modal-content border-0 shadow"><div class="modal-header bg-light"><h5 class="modal-title" id="detailTitle"></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body" id="detailBody"></div></div></div>
    </div>

     <!-- СКРИПТЫ -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, onSnapshot, setDoc, getDoc, arrayUnion } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
        import { firebaseConfig } from './js/config.js';
        
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        window.signInWithPopup = signInWithPopup;
        window.GoogleAuthProvider = GoogleAuthProvider;
        window.onAuthStateChanged = onAuthStateChanged;
        window.signOut = signOut;
        window.addDoc = addDoc;
        window.collection = collection;
        window.getDocs = getDocs;
        window.query = query;
        window.updateDoc = updateDoc;
        window.deleteDoc = deleteDoc;
        window.doc = doc;
        window.onSnapshot = onSnapshot;
        window.setDoc = setDoc;
        window.getDoc = getDoc;
        window.arrayUnion = arrayUnion;
        
        // Модули ядра
        await import('./js/core/auth.js');
        await import('./js/core/friends.js');
        await import('./js/core/utils.js');
        await import('./js/core/stars.js');
        await import('./js/core/gallery.js');
        await import('./js/core/privacy.js');
        
        // Модули разделов
        await import('./js/travel/travelCards.js');
        await import('./js/travel/travelMap.js');
        await import('./js/travel/travelForm.js');
        await import('./js/travel/travelList.js');
        
        await import('./js/food/foodCards.js');
        await import('./js/food/foodForm.js');
        await import('./js/food/foodList.js');
        
        // Запуск приложения
        await import('./js/app.js');
        
        console.log('✅ Все модули загружены');
    </script>
</body>
</html>
