<!DOCTYPE html>
<html lang="ru" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream&Go - Твои мечты и путешествия</title>

    <!-- Bootstrap 5.3 CSS с fallback -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        onerror="this.onerror=null;this.href='css/bootstrap.min.css'">
    <!-- Bootstrap Icons с fallback -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components/cards.css">
    <link rel="stylesheet" href="css/components/forms.css">
    <link rel="stylesheet" href="css/components/navigation.css">
    <link rel="stylesheet" href="css/components/profile.css">

    <style>
        /* Путешествия */
        .travel-card {
            transition: all 0.3s ease;
        }

        .travel-card .card-premium {
            overflow: hidden;
        }

        .travel-card-image {
            height: 200px;
            background-size: cover;
            background-position: center;
            position: relative;
            transition: transform 0.3s ease;
        }

        .travel-card:hover .travel-card-image {
            transform: scale(1.05);
        }

        .travel-card-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #6C5CE7 0%, #a855f7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .travel-card-badges {
            position: absolute;
            top: 1rem;
            left: 1rem;
        }

        .travel-card-actions {
            position: absolute;
            top: 1rem;
            right: 1rem;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .travel-card:hover .travel-card-actions {
            opacity: 1;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .movie-poster {
            position: relative;
            height: 300px;
            overflow: hidden;
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
            background: #2d3436;
        }

        .movie-poster-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-primary);
        }

        .movie-poster-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .movie-card:hover .movie-poster-overlay {
            opacity: 1;
        }

        .movie-badge {
            position: absolute;
            top: 0.5rem;
            left: 0.5rem;
        }

        .movie-rating {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .movie-title {
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .movies-tabs .nav-link {
            border: none;
            color: var(--text-secondary);
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
            font-weight: 500;
        }

        .movies-tabs .nav-link.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            background: transparent;
        }
    </style>
</head>

<body>
    <div id="splashScreen" class="splash-screen">
        <div class="splash-content">
            <div class="splash-logo"><i class="bi bi-rocket-takeoff"></i></div>
            <h1 class="splash-title">Dream<span class="text-accent">&</span>Go</h1>
            <p class="splash-subtitle">Твои мечты становятся реальностью</p>
            <div class="splash-loader">
                <div class="spinner-border text-light" role="status">
                    <span class="visually-hidden">Загрузка...</span>
                </div>
            </div>
        </div>
    </div>

    <div id="app" class="app-container d-none"></div>

    <!-- Bootstrap JS с fallback -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        onerror="this.onerror=null;this.src='js/bootstrap.bundle.min.js';"></script>

    <script type="module" src="js/app.js"></script>
</body>

</html>
