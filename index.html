<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Мои путешествия ✈️</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        .card-img-top { height: 200px; object-fit: cover; }
        .priority-high { border-left: 5px solid #dc3545; }
        .priority-medium { border-left: 5px solid #ffc107; }
        .priority-low { border-left: 5px solid #0d6efd; }
        .photo-thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
        .photo-thumb:hover, .photo-thumb.active-thumb { border-color: #0d6efd; box-shadow: 0 0 0 2px rgba(13,110,253,0.3); }
        #modalMainPhoto { max-height: 70vh; width: 100%; object-fit: contain; background: #000; }
        .star-rating .bi { font-size: 1.4rem; cursor: pointer; color: #ccc; }
        .star-rating .bi.active, .star-rating .bi:hover { color: gold; }
        .tab-content>.tab-pane { display: none; }
        .tab-content>.active { display: block; }
        .list-card { cursor: pointer; transition: transform 0.1s; border: 2px solid transparent; }
        .list-card:hover { transform: scale(1.02); }
        .list-card.active { border-color: #0d6efd !important; }
        .friend-card { transition: background-color 0.2s; }
        .friend-card:hover { background-color: #f8f9fa; }
    </style>
</head>
<body class="bg-light">

    <!-- ЭКРАН ВХОДА -->
    <div id="loginScreen" class="container text-center py-5">
        <i class="bi bi-airplane" style="font-size: 5rem; color: #0d6efd;"></i>
        <h1 class="mt-3">Мои путешествия</h1>
        <p class="text-muted">Войдите, чтобы сохранять любимые места</p>
        <button id="loginBtn" class="btn btn-primary btn-lg px-5">
            <i class="bi bi-google"></i> Войти через Google
        </button>
    </div>

    <!-- ОСНОВНОЙ ЭКРАН -->
    <div id="appScreen" class="d-none">
        <nav class="navbar bg-primary sticky-top" data-bs-theme="dark">
            <div class="container">
                <span class="navbar-brand">✈️ Мои путешествия</span>
                <div class="d-flex align-items-center gap-2">
                    <span class="text-white small" id="userName"></span>
                    <button class="btn btn-outline-light btn-sm" data-bs-toggle="modal" data-bs-target="#friendsModal">
                        <i class="bi bi-people"></i> Друзья
                    </button>
                    <button id="logoutBtn" class="btn btn-outline-light btn-sm">Выйти</button>
                </div>
            </div>
        </nav>

        <div class="container my-3">
            <!-- Выбор списка -->
            <div class="row g-2 mb-3" id="listSelector">
                <div class="col-4">
                    <div class="card list-card active" data-list="my">
                        <div class="card-body text-center py-2">
                            <i class="bi bi-person-circle"></i>
                            <small class="d-block">Мои</small>
                        </div>
                    </div>
                </div>
                <!-- Динамические списки друзей добавятся здесь -->
            </div>

            <!-- Вкладки -->
            <ul class="nav nav-tabs mb-3" id="travelTabs">
                <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#wishlist">🌍 Хочу посетить</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#visited">✅ Посетил</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#addForm">➕ Добавить</button></li>
            </ul>

            <div class="tab-content">
                <div class="tab-pane fade show active" id="wishlist">
                    <div class="row" id="wishlistContainer"></div>
                    <div id="wishlistEmpty" class="text-center py-5 text-muted">
                        <i class="bi bi-map" style="font-size: 3rem;"></i>
                        <p>Пока нет мест. Добавьте первое!</p>
                    </div>
                </div>
                <div class="tab-pane fade" id="visited">
                    <div class="row" id="visitedContainer"></div>
                    <div id="visitedEmpty" class="text-center py-5 text-muted">
                        <p>Вы пока нигде не были.</p>
                    </div>
                </div>
                <div class="tab-pane fade" id="addForm">
                    <div class="row justify-content-center">
                        <div class="col-md-8 col-lg-6">
                            <div class="card shadow">
                                <div class="card-body">
                                    <h4 class="mb-3" id="formTitle">Новое место</h4>
                                    <div class="alert alert-info small mb-3">
                                        <strong>📸 Flickr:</strong> ПКМ на фото → "Копировать адрес изображения" → вставить через запятую
                                    </div>
                                    <form id="placeForm">
                                        <input type="hidden" id="editId" value="">
                                        <div class="mb-3">
                                            <label class="form-label">Название *</label>
                                            <input type="text" class="form-control" id="nameInput" required placeholder="Мурманск">
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Фото (через запятую)</label>
                                            <textarea class="form-control" id="photosInput" rows="2"></textarea>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">🔗 Альбом Flickr</label>
                                            <input type="url" class="form-control" id="albumInput">
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Описание</label>
                                            <textarea class="form-control" id="descInput" rows="2"></textarea>
                                        </div>
                                        <div class="row g-3 mb-3">
                                            <div class="col-md-6">
                                                <label class="form-label">Приоритет</label>
                                                <select class="form-select" id="priorityInput">
                                                    <option value="high">🔥 Очень хочу</option>
                                                    <option value="medium" selected>🙂 Было бы круто</option>
                                                    <option value="low">💭 Когда-нибудь</option>
                                                </select>
                                            </div>
                                            <div class="col-md-6">
                                                <label class="form-label">Статус</label>
                                                <select class="form-select" id="statusInput">
                                                    <option value="want" selected>Хочу посетить</option>
                                                    <option value="visited">Уже посетил</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div id="visitedFields" class="d-none">
                                            <div class="row g-3 mb-3">
                                                <div class="col-md-6">
                                                    <label class="form-label">Дата</label>
                                                    <input type="date" class="form-control" id="dateInput">
                                                </div>
                                                <div class="col-md-6">
                                                    <label class="form-label">Оценка</label>
                                                    <div class="star-rating d-flex gap-1 mt-1" id="starRating"></div>
                                                    <input type="hidden" id="ratingInput" value="0">
                                                </div>
                                            </div>
                                        </div>
                                        <div class="d-flex gap-2">
                                            <button type="submit" class="btn btn-success flex-grow-1" id="submitBtn">
                                                <i class="bi bi-plus-circle"></i> Добавить место
                                            </button>
                                            <button type="button" class="btn btn-outline-secondary d-none" id="cancelEditBtn">Отмена</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА: ДРУЗЬЯ -->
    <div class="modal fade" id="friendsModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">👥 Друзья</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <!-- Мой ID -->
                    <div class="alert alert-secondary small">
                        <strong>Мой ID:</strong> <code id="myUserId">...</code>
                        <button class="btn btn-sm btn-outline-secondary ms-2" onclick="copyUserId()">📋 Копировать</button>
                    </div>
                    
                    <!-- Добавить друга -->
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="friendIdInput" placeholder="Вставьте ID друга">
                        <button class="btn btn-primary" id="addFriendBtn">➕ Добавить</button>
                    </div>
                    
                    <!-- Входящие заявки -->
                    <h6 class="text-muted">Входящие заявки</h6>
                    <div id="incomingRequests"></div>
                    
                    <!-- Список друзей -->
                    <h6 class="text-muted mt-3">Мои друзья</h6>
                    <div id="friendsList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА: ФОТО -->
    <div class="modal fade" id="photoModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content bg-dark">
                <div class="modal-header border-0"><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
                <div class="modal-body text-center">
                    <img id="modalMainPhoto" src="" alt="Фото" class="rounded mb-3">
                    <div id="modalThumbnails" class="d-flex justify-content-center gap-2 flex-wrap"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, where, onSnapshot, setDoc, getDoc, arrayUnion, arrayRemove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

        // ⚠️ ЗАМЕНИТЕ НА ВАШ КОНФИГ:
        const firebaseConfig = {
            apiKey: "AIzaSyDYUcfgt7IIfiks5TXhLrEhAtrrpEPUl7s",
            authDomain: "my-universe-hub.firebaseapp.com",
            projectId: "my-universe-hub",
            storageBucket: "my-universe-hub.firebasestorage.app",
            messagingSenderId: "958432100308",
            appId: "1:958432100308:web:1a77829c26a9d4f2986041",
            measurementId: "G-0VFW249T54"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let currentList = 'my'; // 'my' или 'shared_USERID'
        let currentListName = 'Мои';
        let friends = [];
        let places = [];

        // ========== АВТОРИЗАЦИЯ ==========
        document.getElementById('loginBtn').addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, new GoogleAuthProvider());
            } catch (e) { alert('Ошибка входа: ' + e.message); }
        });
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginScreen').classList.add('d-none');
                document.getElementById('appScreen').classList.remove('d-none');
                document.getElementById('userName').textContent = user.displayName.split(' ')[0];
                document.getElementById('myUserId').textContent = user.uid;
                await createUserProfile();
                await loadFriends();
                renderListSelector();
                loadPlaces();
                listenForRequests();
            } else {
                currentUser = null;
                document.getElementById('loginScreen').classList.remove('d-none');
                document.getElementById('appScreen').classList.add('d-none');
            }
        });

        // ========== ПРОФИЛЬ ПОЛЬЗОВАТЕЛЯ ==========
        async function createUserProfile() {
            const ref = doc(db, 'users', currentUser.uid);
            const snap = await getDoc(ref);
            if (!snap.exists()) {
                await setDoc(ref, {
                    name: currentUser.displayName,
                    email: currentUser.email,
                    friends: [],
                    createdAt: Date.now()
                });
            }
        }

        // ========== ДРУЗЬЯ ==========
        async function loadFriends() {
            const ref = doc(db, 'users', currentUser.uid);
            const snap = await getDoc(ref);
            if (snap.exists()) {
                friends = snap.data().friends || [];
            }
        }

        function listenForRequests() {
            const ref = doc(db, 'users', currentUser.uid);
            onSnapshot(ref, (snap) => {
                if (snap.exists()) {
                    friends = snap.data().friends || [];
                    renderFriendsList();
                    renderIncomingRequests();
                    renderListSelector();
                }
            });
        }

        async function sendFriendRequest(targetId) {
            if (!targetId || targetId === currentUser.uid) {
                alert('Введите корректный ID другого пользователя!');
                return;
            }
            if (friends.find(f => f.uid === targetId)) {
                alert('Этот пользователь уже у вас в друзьях!');
                return;
            }
            // Проверяем существование пользователя
            const targetRef = doc(db, 'users', targetId);
            const targetSnap = await getDoc(targetRef);
            if (!targetSnap.exists()) {
                alert('Пользователь с таким ID не найден. Попросите друга зайти на сайт и скопировать свой ID.');
                return;
            }
            // Добавляем в друзья сразу (упрощённо, без подтверждения)
            await updateDoc(doc(db, 'users', currentUser.uid), {
                friends: arrayUnion({
                    uid: targetId,
                    name: targetSnap.data().name || 'Пользователь',
                    addedAt: Date.now()
                })
            });
            await updateDoc(doc(db, 'users', targetId), {
                friends: arrayUnion({
                    uid: currentUser.uid,
                    name: currentUser.displayName,
                    addedAt: Date.now()
                })
            });
            document.getElementById('friendIdInput').value = '';
            alert('✅ Друг добавлен! Теперь у вас есть совместный список.');
        }

        async function removeFriend(friendUid) {
            if (!confirm('Удалить из друзей? Совместный список будет скрыт.')) return;
            const myFriends = friends.filter(f => f.uid !== friendUid);
            await updateDoc(doc(db, 'users', currentUser.uid), { friends: myFriends });
            
            const friendRef = doc(db, 'users', friendUid);
            const friendSnap = await getDoc(friendRef);
            if (friendSnap.exists()) {
                const theirFriends = (friendSnap.data().friends || []).filter(f => f.uid !== currentUser.uid);
                await updateDoc(friendRef, { friends: theirFriends });
            }
            if (currentList === 'shared_' + friendUid) {
                currentList = 'my';
                currentListName = 'Мои';
                renderListSelector();
                loadPlaces();
            }
        }

        function renderFriendsList() {
            const container = document.getElementById('friendsList');
            if (friends.length === 0) {
                container.innerHTML = '<p class="text-muted small">Пока нет друзей. Добавьте первого!</p>';
                return;
            }
            container.innerHTML = friends.map(f => `
                <div class="d-flex justify-content-between align-items-center friend-card p-2 rounded mb-1">
                    <div>
                        <strong>${f.name}</strong>
                        <small class="text-muted ms-2">${f.uid.substring(0, 8)}...</small>
                    </div>
                    <button class="btn btn-sm btn-outline-danger" onclick="window._removeFriend('${f.uid}')">Удалить</button>
                </div>
            `).join('');
        }

        function renderIncomingRequests() {
            document.getElementById('incomingRequests').innerHTML = 
                '<p class="text-muted small">Заявки принимаются автоматически при добавлении.</p>';
        }

        window._removeFriend = removeFriend;

        // ========== ВЫБОР СПИСКА ==========
        function renderListSelector() {
            const container = document.getElementById('listSelector');
            let html = `
                <div class="col-4">
                    <div class="card list-card ${currentList === 'my' ? 'active' : ''}" data-list="my">
                        <div class="card-body text-center py-2">
                            <i class="bi bi-person-circle"></i>
                            <small class="d-block">Мои</small>
                        </div>
                    </div>
                </div>
            `;
            friends.forEach(f => {
                html += `
                    <div class="col-4">
                        <div class="card list-card ${currentList === 'shared_' + f.uid ? 'active' : ''}" data-list="shared_${f.uid}">
                            <div class="card-body text-center py-2">
                                <i class="bi bi-heart"></i>
                                <small class="d-block">${f.name.split(' ')[0]}</small>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            
            // Обработчики кликов
            container.querySelectorAll('.list-card').forEach(card => {
                card.addEventListener('click', () => {
                    currentList = card.dataset.list;
                    currentListName = currentList === 'my' ? 'Мои' : card.querySelector('small').textContent;
                    renderListSelector();
                    loadPlaces();
                });
            });
        }

        document.getElementById('addFriendBtn').addEventListener('click', () => {
            const targetId = document.getElementById('friendIdInput').value.trim();
            sendFriendRequest(targetId);
        });

        // ========== ЗАГРУЗКА МЕСТ ==========
        function getCollectionName() {
            return currentList === 'my' 
                ? `users/${currentUser.uid}/places` 
                : `shared/${[currentUser.uid, currentList.replace('shared_', '')].sort().join('_')}/places`;
        }

        async function loadPlaces() {
            if (!currentUser) return;
            const collName = getCollectionName();
            const snapshot = await getDocs(query(collection(db, collName)));
            places = [];
            snapshot.forEach(doc => {
                places.push({ id: doc.id, ...doc.data(), _firestoreId: doc.id });
            });
            places.sort((a, b) => b.createdAt - a.createdAt);
            renderAll();
        }

        async function savePlace(data) {
            if (!currentUser) return;
            data.createdAt = Date.now();
            data.author = currentUser.displayName;
            await addDoc(collection(db, getCollectionName()), data);
            await loadPlaces();
        }

        async function updatePlace(id, data) {
            await updateDoc(doc(db, getCollectionName(), id), data);
            await loadPlaces();
        }

        async function deletePlace(id) {
            if (!confirm('Удалить?')) return;
            await deleteDoc(doc(db, getCollectionName(), id));
            await loadPlaces();
        }

        // ========== ЗВЁЗДОЧКИ ==========
        function setupStarRating(initial) {
            initial = initial || 0;
            const c = document.getElementById('starRating');
            c.innerHTML = '';
            const ri = document.getElementById('ratingInput');
            ri.value = initial;
            for (let i = 1; i <= 5; i++) {
                const s = document.createElement('i');
                s.className = i <= initial ? 'bi bi-star-fill active' : 'bi bi-star';
                s.dataset.value = i; s.style.cursor = 'pointer';
                s.addEventListener('mouseenter', () => c.querySelectorAll('i').forEach((st, idx) => st.className = idx < i ? 'bi bi-star-fill active' : 'bi bi-star'));
                s.addEventListener('mouseleave', () => { const v = parseInt(ri.value)||0; c.querySelectorAll('i').forEach((st, idx) => st.className = idx < v ? 'bi bi-star-fill active' : 'bi bi-star'); });
                s.addEventListener('click', () => { ri.value = i; c.querySelectorAll('i').forEach((st, idx) => st.className = idx < i ? 'bi bi-star-fill active' : 'bi bi-star'); });
                c.appendChild(s);
            }
        }

        function openPhotoGallery(photos, start) {
            start = start || 0;
            if (!photos || !photos.length) return;
            const modal = new bootstrap.Modal(document.getElementById('photoModal'));
            const mp = document.getElementById('modalMainPhoto');
            const tc = document.getElementById('modalThumbnails');
            let idx = start;
            function show(i) { idx = i; mp.src = photos[i]; tc.querySelectorAll('img').forEach((t,j) => t.classList.toggle('active-thumb', j===i)); }
            tc.innerHTML = '';
            photos.forEach((p,i) => { const t = document.createElement('img'); t.src=p; t.className='photo-thumb'; if(i===start) t.classList.add('active-thumb'); t.addEventListener('click',()=>show(i)); tc.appendChild(t); });
            show(start); modal.show();
        }

        function renderAll() {
            renderPlaces('wishlistContainer', places.filter(p=>p.status==='want'), 'wishlistEmpty');
            renderPlaces('visitedContainer', places.filter(p=>p.status==='visited'), 'visitedEmpty');
        }

        function renderPlaces(cid, arr, eid) {
            const c = document.getElementById(cid);
            document.getElementById(eid).classList.toggle('d-none', arr.length > 0);
            c.innerHTML = '';
            arr.forEach(p => {
                const col = document.createElement('div'); col.className = 'col-md-6 col-lg-4 mb-3';
                let pc='', pe='';
                if(p.priority==='high'){pc='priority-high';pe='🔥';}else if(p.priority==='medium'){pc='priority-medium';pe='🙂';}else{pc='priority-low';pe='💭';}
                const photos = p.photos||[];
                const mi = photos.length>0?photos[0]:'https://placehold.co/400x200/e2e8f0/64748b?text=Нет+фото';
                let th='';
                if(photos.length>1){th='<div class="d-flex gap-1 mt-2 flex-wrap">';photos.forEach((ph,i)=>{th+=`<img src="${ph}" class="photo-thumb" onclick="event.stopPropagation();openPhotoGallery(${JSON.stringify(photos).replace(/"/g,'&quot;')},${i})">`;});th+='</div>';}
                let ab=''; if(p.album) ab=`<a href="${p.album}" target="_blank" class="btn btn-sm btn-outline-info mt-2 w-100"><i class="bi bi-images"></i> Смотреть все фото</a>`;
                let sh=''; if(p.status==='visited') sh=`<div class="d-flex justify-content-between align-items-center mt-2"><small class="text-muted">📅 ${p.date||''}</small><span class="star-rating">${'<i class="bi bi-star-fill active"></i>'.repeat(p.rating||0)}${'<i class="bi bi-star"></i>'.repeat(5-(p.rating||0))}</span></div>`;
                let authorHTML = '';
                if (p.author && currentList !== 'my') {
                    authorHTML = `<small class="text-muted">добавил(а): ${p.author}</small>`;
                }
                col.innerHTML=`<div class="card h-100 shadow-sm ${pc}"><img src="${mi}" class="card-img-top" alt="${p.name}"${photos.length>0?` onclick="openPhotoGallery(${JSON.stringify(photos).replace(/"/g,'&quot;')},0)" style="cursor:pointer"`:''}><div class="card-body d-flex flex-column"><h5 class="card-title">${pe} ${p.name}</h5>${authorHTML}<p class="card-text text-muted small flex-grow-1">${p.description||''}</p>${th}${sh}${ab}<div class="mt-2 d-flex gap-1">${p.status==='want'?`<button class="btn btn-sm btn-outline-success" onclick="window._mv('${p._firestoreId}')"><i class="bi bi-check-lg"></i> Был здесь</button>`:''}<button class="btn btn-sm btn-outline-warning" onclick="window._ed('${p._firestoreId}')"><i class="bi bi-pencil"></i></button><button class="btn btn-sm btn-outline-danger" onclick="window._dl('${p._firestoreId}')"><i class="bi bi-trash"></i></button></div></div></div>`;
                c.appendChild(col);
            });
        }

        window._mv = async (id) => { const p = places.find(x=>x._firestoreId===id); if(p) await updatePlace(id, {...p, status:'visited', date:new Date().toISOString().split('T')[0], rating:0}); };
        window._dl = async (id) => { await deletePlace(id); };
        window._ed = (id) => {
            const p = places.find(x=>x._firestoreId===id); if(!p) return;
            document.getElementById('editId').value=id;
            document.getElementById('nameInput').value=p.name;
            document.getElementById('photosInput').value=(p.photos||[]).join(', ');
            document.getElementById('albumInput').value=p.album||'';
            document.getElementById('descInput').value=p.description||'';
            document.getElementById('priorityInput').value=p.priority;
            document.getElementById('statusInput').value=p.status;
            document.getElementById('formTitle').textContent='✏️ Редактировать';
            document.getElementById('submitBtn').innerHTML='<i class="bi bi-check-lg"></i> Сохранить';
            document.getElementById('cancelEditBtn').classList.remove('d-none');
            const vf=document.getElementById('visitedFields');
            if(p.status==='visited'){vf.classList.remove('d-none');document.getElementById('dateInput').value=p.date||'';setupStarRating(p.rating||0);}else{vf.classList.add('d-none');setupStarRating(0);}
            new bootstrap.Tab(document.querySelector('#travelTabs button[data-bs-target="#addForm"]')).show();
        };

        function setupForm() {
            const form=document.getElementById('placeForm');
            document.getElementById('cancelEditBtn').addEventListener('click', resetForm);
            document.getElementById('statusInput').addEventListener('change', function(){
                const vf=document.getElementById('visitedFields');
                if(this.value==='visited'){vf.classList.remove('d-none');setupStarRating(parseInt(document.getElementById('ratingInput').value)||0);}else{vf.classList.add('d-none');}
            });
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const editId=document.getElementById('editId').value;
                const name=document.getElementById('nameInput').value.trim();
                if(!name){alert('Введите название!');return;}
                const pr=document.getElementById('photosInput').value.trim();
                const status=document.getElementById('statusInput').value;
                const data={
                    name, photos:pr?pr.split(',').map(s=>s.trim()).filter(s=>s):[],
                    album:document.getElementById('albumInput').value.trim()||'',
                    description:document.getElementById('descInput').value.trim(),
                    priority:document.getElementById('priorityInput').value, status,
                    date:status==='visited'?document.getElementById('dateInput').value:'',
                    rating:status==='visited'?parseInt(document.getElementById('ratingInput').value)||0:0
                };
                if(editId){await updatePlace(editId, data);}else{await savePlace(data);}
                resetForm();
                new bootstrap.Tab(document.querySelector('#travelTabs button[data-bs-target="#wishlist"]')).show();
                alert(editId?'✅ Обновлено!':'✅ Добавлено!');
            });
        }

        function resetForm() {
            document.getElementById('placeForm').reset();
            document.getElementById('editId').value='';
            document.getElementById('formTitle').textContent='Новое место';
            document.getElementById('submitBtn').innerHTML='<i class="bi bi-plus-circle"></i> Добавить место';
            document.getElementById('cancelEditBtn').classList.add('d-none');
            document.getElementById('visitedFields').classList.add('d-none');
            setupStarRating(0);
        }

        // ========== КОПИРОВАТЬ ID ==========
        window.copyUserId = function() {
            navigator.clipboard.writeText(currentUser.uid);
            alert('ID скопирован! Отправьте его другу.');
        };

        setupStarRating(0);
        setupForm();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
