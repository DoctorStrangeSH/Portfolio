<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream & Go ✨</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <!-- ЗАГРУЗКА -->
    <div id="loadingScreen" class="d-flex flex-column justify-content-center align-items-center vh-100">
        <div style="text-align:center">
            <img src="img/enotik.gif" alt="Загрузка..." style="width:140px;height:140px;border-radius:50%;background:white;padding:10px;box-shadow:0 8px 32px rgba(0,0,0,0.2)">
            <p class="text-white mt-4 fw-bold fs-5">Dream & Go...</p>
        </div>
    </div>

    <!-- ВХОД -->
    <div id="loginScreen" class="d-flex flex-column justify-content-center align-items-center vh-100 d-none">
        <div class="text-center fade-in">
            <div class="mb-3">
                <span style="font-size:5rem">🚀</span>
            </div>
            <h1 class="fw-bold mb-2" style="font-size:2rem">Dream & Go</h1>
            <p class="mb-4" style="color:var(--text-secondary)">Твой персональный органайзер жизни</p>
            
            <div class="card shadow-sm mb-3" style="max-width:380px;width:100%;border-radius:20px">
                <div class="card-body p-4">
                    <form id="emailLoginForm" autocomplete="on">
                        <h6 class="text-center mb-3" style="font-weight:600">Вход</h6>
                        <div class="mb-3"><input type="email" class="form-control" id="emailInput" placeholder="Email" required></div>
                        <div class="mb-3"><input type="password" class="form-control" id="passwordInput" placeholder="Пароль" required minlength="6"></div>
                        <button type="submit" class="btn btn-primary w-100 mb-3">Войти</button>
                        <div class="d-flex justify-content-between small">
                            <a href="#" id="showRegister" style="color:var(--primary);font-weight:500">Регистрация</a>
                            <a href="#" id="showReset" style="color:var(--text-muted)">Забыли пароль?</a>
                        </div>
                    </form>
                    <form id="registerForm" class="d-none" autocomplete="on">
                        <h6 class="text-center mb-3" style="font-weight:600">Регистрация</h6>
                        <div class="mb-3"><input type="text" class="form-control" id="regName" placeholder="Имя" required></div>
                        <div class="mb-3"><input type="email" class="form-control" id="regEmail" placeholder="Email" required></div>
                        <div class="mb-3"><input type="password" class="form-control" id="regPassword" placeholder="Пароль (мин. 6)" required minlength="6"></div>
                        <button type="submit" class="btn btn-success w-100 mb-3">Зарегистрироваться</button>
                        <a href="#" id="showLogin" class="small" style="color:var(--primary);font-weight:500">Уже есть аккаунт?</a>
                    </form>
                    <form id="resetForm" class="d-none">
                        <h6 class="text-center mb-3" style="font-weight:600">Сброс пароля</h6>
                        <p class="small" style="color:var(--text-secondary)">Отправим ссылку на почту</p>
                        <div class="mb-3"><input type="email" class="form-control" id="resetEmail" placeholder="Email" required></div>
                        <button type="submit" class="btn btn-warning w-100 mb-3">Отправить</button>
                        <a href="#" id="showLoginFromReset" class="small" style="color:var(--primary);font-weight:500">Вернуться ко входу</a>
                    </form>
                </div>
            </div>
            
            <div class="d-flex align-items-center gap-3 mb-3" style="max-width:380px;width:100%">
                <hr class="flex-grow-1" style="border-color:var(--border)">
                <span style="color:var(--text-muted);font-size:0.85rem">или</span>
                <hr class="flex-grow-1" style="border-color:var(--border)">
            </div>
            
            <button id="loginGoogleBtn" class="btn btn-outline-primary w-100 py-3" style="max-width:380px">
                <img src="https://www.google.com/favicon.ico" width="20" class="me-2">Войти через Google
            </button>
        </div>
    </div>

    <!-- ПРИЛОЖЕНИЕ -->
    <div id="appScreen" class="d-none">
        <!-- НАВБАР -->
        <nav class="navbar navbar-expand-lg sticky-top">
            <div class="container">
                <span class="navbar-brand">🚀 Dream & Go</span>
                
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <i class="bi bi-list" style="font-size:1.5rem;color:var(--text)"></i>
                </button>
                
                <div class="collapse navbar-collapse" id="navbarNav">
                    <!-- Меню разделов -->
                    <ul class="navbar-nav mx-auto" id="sectionMenu">
                        <li class="nav-item"><button class="nav-link active" data-section="travel">✈️ Путешествия</button></li>
                        <li class="nav-item"><button class="nav-link" data-section="food">🍽️ Рестораны</button></li>
                        <li class="nav-item"><button class="nav-link" data-section="movies">🎬 Кино</button></li>
                        <li class="nav-item"><button class="nav-link" data-section="dreams">💭 Мечты</button></li>
                        <li class="nav-item"><button class="nav-link" data-section="shared">👥 Совместно</button></li>
                    </ul>
                    
                    <!-- Кнопки справа -->
                    <div class="d-flex align-items-center gap-2">
                        <button class="theme-toggle light" id="themeToggle" onclick="window.toggleTheme()" title="Тема">
                            <span class="theme-toggle-circle">☀️</span>
                        </button>
                        
                        <span class="d-none d-lg-inline" style="font-weight:600;font-size:0.9rem;color:var(--text)" id="userName"></span>
                        
                        <button class="btn btn-outline-primary btn-sm position-relative" onclick="window.showMessenger()" title="Сообщения">
                            <i class="bi bi-chat-dots"></i>
                            <span id="messagesBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none" style="font-size:0.6rem">0</span>
                        </button>
                        
                        <button class="btn btn-outline-primary btn-sm" onclick="window.showFeed()" title="Лента"><i class="bi bi-lightning-charge"></i></button>
                        <button class="btn btn-outline-primary btn-sm" onclick="window.showProfile()" title="Профиль"><i class="bi bi-person-circle"></i></button>
                        
                        <button class="btn btn-outline-primary btn-sm position-relative" data-bs-toggle="modal" data-bs-target="#friendsModal" title="Друзья">
                            <i class="bi bi-people-fill"></i>
                            <span id="friendsBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none" style="font-size:0.6rem">0</span>
                        </button>
                        
                        <button id="logoutBtn" class="btn btn-outline-danger btn-sm"><i class="bi bi-box-arrow-right"></i></button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- КОНТЕЙНЕР -->
        <div id="sectionContainer" class="container py-4"></div>
    </div>

    <!-- МОДАЛКИ -->
    <div class="modal fade" id="friendsModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">👥 Друзья</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <div class="alert alert-light border small mb-3"><div class="d-flex justify-content-between align-items-center"><span><strong>Мой ID:</strong> <code id="myUserId">...</code></span><button class="btn btn-sm btn-outline-primary" id="copyIdBtn"><i class="bi bi-clipboard"></i></button></div></div>
            <label class="form-label fw-medium">Добавить по ID или нику</label>
            <div class="input-group mb-3"><input type="text" class="form-control" id="friendIdInput" placeholder="ID или @ник"><button class="btn btn-primary" id="addFriendBtn"><i class="bi bi-send me-1"></i>Отправить</button></div>
            <div id="requestStatus" class="small mb-3"></div>
            <h6 class="text-muted mb-2">📨 Входящие <span id="incomingBadge" class="badge bg-danger d-none">0</span></h6>
            <div id="incomingRequests"><p class="text-muted small text-center py-2">Нет заявок</p></div>
            <hr><h6 class="text-muted mb-2">📤 Отправленные</h6>
            <div id="outgoingRequests"><p class="text-muted small text-center py-2">Нет заявок</p></div>
            <hr><h6 class="text-muted mb-2">❤️ Друзья</h6>
            <div id="friendsList"><p class="text-muted small text-center py-2">Пока нет</p></div>
        </div></div></div>
    </div>

    <div class="modal fade" id="photoModal" tabindex="-1"><div class="modal-dialog modal-xl modal-dialog-centered"><div class="modal-content bg-dark border-0"><div class="modal-header border-0"><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div><div class="modal-body text-center"><img id="modalMainPhoto" src="" class="rounded mb-3 shadow"><div id="modalThumbnails" class="d-flex justify-content-center gap-2 flex-wrap"></div></div></div></div></div>
    <div class="modal fade" id="placeDetailModal" tabindex="-1"><div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable"><div class="modal-content"><div class="modal-header"><h5 class="modal-title" id="detailTitle"></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body" id="detailBody"></div></div></div></div>

    <!-- СКРИПТЫ -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('hidden.bs.modal', function() { if (document.activeElement) document.activeElement.blur(); });
        
        // Тема
        window.toggleTheme = function() {
            var html = document.documentElement;
            var current = html.getAttribute('data-theme');
            var next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeToggle(next);
        };
        
        function updateThemeToggle(theme) {
            var btn = document.getElementById('themeToggle');
            var circle = btn.querySelector('.theme-toggle-circle');
            btn.className = 'theme-toggle ' + theme;
            circle.textContent = theme === 'dark' ? '🌙' : '☀️';
        }
        
        var savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        setTimeout(function() { updateThemeToggle(savedTheme); }, 100);
    </script>
    
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, onSnapshot, setDoc, getDoc, arrayUnion } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
        import { firebaseConfig } from './js/config.js';
        
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        window.signInWithPopup = signInWithPopup;
        window.GoogleAuthProvider = GoogleAuthProvider;
        window.onAuthStateChanged = onAuthStateChanged;
        window.signOut = signOut;
        window.addDoc = addDoc;
        window.collection = collection;
        window.getDocs = getDocs;
        window.query = query;
        window.updateDoc = updateDoc;
        window.deleteDoc = deleteDoc;
        window.doc = doc;
        window.onSnapshot = onSnapshot;
        window.setDoc = setDoc;
        window.getDoc = getDoc;
        window.arrayUnion = arrayUnion;
        
        await import('./js/core/auth.js');
        await import('./js/core/friends.js');
        await import('./js/core/utils.js');
        await import('./js/core/stars.js');
        await import('./js/core/gallery.js');
        await import('./js/core/privacy.js');
        await import('./js/travel/travelCards.js');
        await import('./js/travel/travelMap.js');
        await import('./js/travel/travelForm.js');
        await import('./js/travel/travelList.js');
        await import('./js/food/foodCards.js');
        await import('./js/food/foodForm.js');
        await import('./js/food/foodList.js');
        await import('./js/movies/moviesCards.js');
        await import('./js/movies/moviesList.js');
        await import('./js/dreams/dreamsCards.js');
        await import('./js/dreams/dreamsList.js');
        await import('./js/social/profile.js');
        await import('./js/social/feed.js');
        await import('./js/social/comments.js');
        await import('./js/social/chat.js');
        await import('./js/social/messenger.js');
        await import('./js/social/shared.js');
        await import('./js/app.js');
        
        console.log('✅ Dream & Go готов');
        
        window.onAuthStateChanged(window.auth, async (user) => {
            if (user) {
                window.currentUser = user;
                var myUserIdEl = document.getElementById('myUserId');
                if (myUserIdEl) myUserIdEl.textContent = user.uid;
                document.getElementById('userName').textContent = (user.displayName || user.email?.split('@')[0] || 'Пользователь').split(' ')[0];
                if (!window._appInitialized) {
                    window._appInitialized = true;
                    document.getElementById('loadingScreen').classList.add('d-none');
                    document.getElementById('loginScreen').classList.add('d-none');
                    document.getElementById('appScreen').classList.remove('d-none');
                    if (window.initApp) await window.initApp();
                }
            } else {
                document.getElementById('loadingScreen').classList.add('d-none');
                document.getElementById('appScreen').classList.add('d-none');
                document.getElementById('loginScreen').classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
